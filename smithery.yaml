name: market-intelligence
displayName: Octodamus Market Intelligence
description: >
  AI oracle for crypto markets. BUY/SELL/HOLD signals with 9/11 consensus
  scoring across 27 live data feeds. One call returns everything an agent
  needs to make a trade decision.

  Sample output from get_agent_signal():
    action: "BUY" | confidence: 8/11 | signal: "UP"
    btc_price: 78420 | fear_greed: 47 (Neutral)
    funding_rate: -0.003% (shorts paying - bullish)
    long_short: 43% long / 57% short (SHORT-HEAVY - contrarian BUY)
    polymarket_edge: { market: "BTC above 80K Apr 30?", ev_gap: "14%" }
    reasoning: "Funding negative, top traders flipped long, BB compressed..."

  Free to try — no API key needed for basic tools.
  Premium ($0.01/call via x402 on Base, or $29/year):
  api.octodamus.com/v2/signal

  Designed for 15-minute agent poll cycles. Used by autonomous trading
  agents on Polymarket and Limitless Exchange.

version: 1.1.0
icon: https://octodamus.com/octo_logo.png
homepage: https://octodamus.com
repository: https://github.com/octodamusai/octodamus
license: MIT
categories:
  - finance
  - crypto
  - market-data
tags:
  - crypto
  - market-intelligence
  - polymarket
  - trading-signals
  - bitcoin
  - oracle
  - fear-greed
  - prediction-markets
  - defi
  - x402
  - autonomous-agent
  - limitless

startCommand:
  type: url
  url: https://api.octodamus.com/mcp
  configSchema:
    type: object
    properties:
      apiKey:
        type: string
        title: OctoData API Key (optional - leave blank for free tools)
        description: >
          Leave blank to use free tools: get_agent_signal, get_market_brief,
          get_polymarket_edge, get_data_sources. Premium ($0.01/call x402
          or $29/yr): api.octodamus.com/v1/signup
        default: ""
    required: []

prompts:
  - name: btc-signal-now
    description: Get the current BTC oracle signal with reasoning
    arguments:
      - name: asset
        description: Asset to check (BTC, ETH, SOL)
        required: false

  - name: should-i-trade
    description: Full decision brief — oracle signal + Polymarket edges + macro context
    arguments: []

  - name: polymarket-edges
    description: Find prediction market opportunities with EV scoring
    arguments: []
